<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Carregar a biblioteca do Google API -->
    <script src="https://apis.google.com/js/platform.js" async defer></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo do Projeto">
            <span>Plataforma de Conservação</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sintese.html">Síntese</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <h1>Bem-vindo de volta!</h1>
            <p>Entre para acessar o catálogo completo das espécies nativas.</p>
            <form action="catalogo.html" method="POST" class="login-form">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

                <button type="submit" class="botao">Entrar</button>
            </form>
            
            <div class="social-login">
                <a href="#" class="social-button google" id="google-signin">
                    <img src="google_logo.png" alt="Login com Google"> Entrar com Google
                </a>
                <a href="#" class="social-button github">
                    <img src="github_logo.png" alt="Login com GitHub"> Entrar com GitHub
                </a>
            </div>
            
            <p>Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Plataforma de Conservação - Todos os direitos reservados.</p>
    </footer>

    <script>
        // Função chamada quando o login com o Google é bem-sucedido
        function onSignIn(googleUser) {
            // Obtém o perfil do usuário
            var profile = googleUser.getBasicProfile();
            var userName = profile.getName();
            var userEmail = profile.getEmail();

            console.log('Nome: ' + userName);
            console.log('E-mail: ' + userEmail);

            // Redireciona para a página "catalogo.html" após o login
            window.location.href = 'catalogo.html';
        }

        // Inicializando o login do Google
        function startApp() {
            gapi.load('auth2', function() {
                gapi.auth2.init({
                    client_id: 'SEU_CLIENT_ID_GOOGLE' // Substitua pelo seu Client ID do Google
                });
            });
        }

        // Chamando a função de inicialização assim que a página carrega
        startApp();
    </script>
</body>
</html>
