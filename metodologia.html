<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metodologia</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="logo">
      <img src="./img/logo.png" alt="Logo do Projeto"/>
      <span>Plataforma de Conservação</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="login.html">Catálogo</a></li>
        <li><a href="metodologia.html">Metodologia</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a href="sobre.html">Sobre</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="metodologia-container" id="metodologia">
      <!-- Conteúdo será inserido via JavaScript -->
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Plataforma de Conservação - Todos os direitos reservados.</p>
  </footer>

  <script>
    fetch('./html_dados_variaveis/metodologia.json')
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById('metodologia');

        const titulo = document.createElement('h1');
        titulo.textContent = data.titulo;
        container.appendChild(titulo);

        const descricao = document.createElement('p');
        descricao.textContent = data.descricao;
        container.appendChild(descricao);

        data.etapas.forEach(etapa => {
          const h2 = document.createElement('h2');
          h2.textContent = etapa.titulo;
          container.appendChild(h2);

          const p = document.createElement('p');
          p.textContent = etapa.descricao;
          container.appendChild(p);
        });

        const mensagemFinal = document.createElement('p');
        mensagemFinal.textContent = data.mensagem_final;
        container.appendChild(mensagemFinal);
      })
      .catch(error => {
        console.error('Erro ao carregar o JSON:', error);
      });
  </script>
</body>
</html>
